<!DOCTYPE html>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<body class="bg-background text-on-background antialiased min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/70 dark:bg-surface/70 backdrop-blur-xl border-b-[0.5px] border-outline-variant/30 flex justify-between items-center px-4 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary">map</span>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface dark:text-on-surface">旅图</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 px-4 max-w-3xl mx-auto flex flex-col gap-section-gap">
<!-- Header Section -->
<section>
<h2 class="font-headline-lg text-headline-lg text-primary tracking-tight">伦敦 12 日旅行</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
                即将开始您的精彩旅程
            </p>
</section>
<!-- Overview Section -->
<section class="flex flex-col gap-stack-gap">
<div class="flex items-baseline justify-between">
<h3 class="font-headline-md text-headline-md text-on-surface">今日概览</h3>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">第 3 天</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">大英博物馆与西区音乐剧</p>
<!-- Map Preview Card -->
<div class="relative w-full h-48 rounded-xl overflow-hidden border-[0.5px] border-outline-variant/30 shadow-lg mt-2 group cursor-pointer active:scale-[0.98] transition-transform duration-200">

<!-- Gradient Overlay for contrast -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/90 via-surface-container/20 to-transparent"></div>
<!-- Overlay Elements -->
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div class="flex items-center gap-2 bg-surface/80 backdrop-blur-md px-3 py-1.5 rounded-full border border-outline-variant/40">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-label-sm text-label-sm text-on-surface">正在导览</span>
</div>
<div class="w-10 h-10 rounded-full bg-primary/20 backdrop-blur-md border border-primary/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined icon-filled">navigation</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-3 mt-2">
<button class="flex-1 bg-primary text-on-primary py-3.5 px-4 rounded-xl font-label-sm text-label-sm flex items-center justify-center gap-2 active:scale-95 duration-200 shadow-md">
<span class="material-symbols-outlined text-[18px]">calendar_view_day</span>
                    进入日视图
                </button>
<button class="flex-1 bg-surface-container-high text-primary py-3.5 px-4 rounded-xl border border-outline-variant/50 font-label-sm text-label-sm flex items-center justify-center gap-2 hover:bg-surface-container-highest transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[18px]">confirmation_number</span>
                    票据库
                </button>
</div>
</section>
<!-- Schedule Section -->
<section class="flex flex-col gap-stack-gap mt-4">
<h3 class="font-headline-md text-headline-md text-on-surface">今天的安排</h3>
<div class="bg-surface-container rounded-xl border-[0.5px] border-outline-variant/30 overflow-hidden flex flex-col relative">
<!-- Timeline vertical line behind -->
<div class="absolute left-[39px] top-6 bottom-6 w-[1px] bg-outline-variant/40 z-0"></div>
<!-- Row 1: In Progress -->
<div class="flex items-stretch p-4 relative z-10 group hover:bg-surface-container-high/50 transition-colors cursor-pointer">
<div class="flex flex-col items-center mr-4 w-12 pt-1">
<div class="w-3 h-3 rounded-full bg-primary ring-4 ring-surface-container group-hover:ring-surface-container-high z-10 shadow-[0_0_8px_rgba(170,199,255,0.6)]"></div>
</div>
<div class="flex-1 pb-4 border-b border-outline-variant/20">
<div class="flex justify-between items-start mb-1">
<h4 class="font-body-lg text-body-lg text-on-surface font-medium">大英博物馆</h4>
<span class="bg-primary/20 text-primary px-2 py-0.5 rounded-full font-label-sm text-label-sm border border-primary/30">进行中</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span>
                            10:00 – 16:30
                        </p>
</div>
</div>
<!-- Row 2: Booked -->
<div class="flex items-stretch p-4 relative z-10 group hover:bg-surface-container-high/50 transition-colors cursor-pointer">
<div class="flex flex-col items-center mr-4 w-12 pt-1">
<div class="w-3 h-3 rounded-full bg-surface-variant border-[1.5px] border-outline ring-4 ring-surface-container group-hover:ring-surface-container-high z-10"></div>
</div>
<div class="flex-1 pb-4 border-b border-outline-variant/20">
<div class="flex justify-between items-start mb-1">
<h4 class="font-body-lg text-body-lg text-on-surface font-medium">午餐 · Dishoom 餐厅</h4>
<span class="bg-surface-container-highest text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-label-sm border border-outline-variant/50">已预订</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span>
                            12:45 – 14:15
                        </p>
</div>
</div>
<!-- Row 3: Booked -->
<div class="flex items-stretch p-4 relative z-10 group hover:bg-surface-container-high/50 transition-colors cursor-pointer">
<div class="flex flex-col items-center mr-4 w-12 pt-1">
<div class="w-3 h-3 rounded-full bg-surface-variant border-[1.5px] border-outline ring-4 ring-surface-container group-hover:ring-surface-container-high z-10"></div>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<h4 class="font-body-lg text-body-lg text-on-surface font-medium">悲惨世界音乐剧</h4>
<span class="bg-surface-container-highest text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-label-sm border border-outline-variant/50">已预订</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span>

</div>
</div>
</div>
</section>

</div>

</div>

<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:text-on-surface transition-colors active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined">settings</span>
