<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1677ff" />
    <meta name="description" content="本地优先的出国旅行行程、地图路线、交通记录与票据管理工具。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="旅图" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>旅图 TripMap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var mode = window.localStorage.getItem('tripmap:appearance')
          if (mode !== 'light' && mode !== 'dark' && mode !== 'system') mode = 'system'
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          var isDark = mode === 'dark' || (mode === 'system' && prefersDark)
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
          var themeColor = document.querySelector('meta[name="theme-color"]')
          if (themeColor) themeColor.setAttribute('content', isDark ? '#101827' : '#eef3f8')
        } catch (error) {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
